paths:
  model: "PJB6_YS1_Rh32"
  directory: "StagYY"
  base: 
    model: "/mnt/c/Users/jourdon/Documents/Scripts/PostProc" # Absolute path to directory containing the model directory
    output: "/mnt/c/Users/jourdon/Documents/Scripts/PostProc" # Absolute path to directory where output directory will be created, we append the model directory name
  # optional
  #pvd: "name.pvd" # if not given, will be attributed a default name based on model
  #prefix: "prefix" # put here any prefix name you want to add to the output files

fields:
  # regions are a special field, if it happens that they were output as separated fields we reconstruct them as a single field
  # with the name regions and values corresponding to each region based on the regions list provided below.
  # If there is only a single output field for regions, it will be renamed to "regions" and keep its original values.
  process: # fields that will be processed and added to the mesh
    - "velocity"
    - "velocity_r"
    #- "e2"
    - "temperature"
    #- "divergence"
    #- "composition"
    #- "primordial"
    #- "proterozoic"
    #- "viscosity"
    - "grad_T"
    - "grad_T_r"
    #- "stress"
    #- "pressure"
    #- "nrc" #??? don't know what is this field
    #- "vorticity"
  
  regions:
    - "primordial"
    - "composition"
    - "proterozoic"

  # Optional: if surface is true we only output the shell surface, if false we output the whole volume mesh.
  surface: true

steps:
  # by default we restart from the last step found in the pvd file if it exists, otherwise from the start step.
  # Setting reset to true will ignore any existing pvd file and start from the start step, erasing any existing pvd file in the output directory.
  reset: true

  # if step is given it will be used as the only step to process
  #step: 0

  # starting step: note that if a pvd file already exists in the output directory, 
  # the starting step will be updated to the last step found in the pvd file + 1.
  start: 39

  # end step: if given we process steps from start to end, if not given we process all steps starting from start
  #end: 3

  # process every delta steps, default is 1
  #delta: 1

scaling:

  scale: true
  Ra: 1e7
  temperature:
    factor: 2700.0
    unit: "K"
  length:
    factor: 2.89e6
    unit: "m"
  diffusivity:
    factor: 1e-6
    unit: "m**2/s"
  expansion:
    factor: 3e-5
    unit: "1/K"
  gravity:
    factor: 9.81
    unit: "m/s**2"
  density:
    factor: 3300
    unit: "kg/m**3"